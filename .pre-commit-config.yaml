# .pre-commit-config.yaml
#
# Pre-commit framework configuration for the Tomato 3-Signal sandbox.
#
# Per spec Section 26.6 lines 7752:
#   "Pre-commit hooks (.pre-commit-config.yaml) auto-run linting and formatting
#    locally; this catches issues before push."
# Per spec Section 26.4 lines 7700-7701: CI Lint stage (ruff, black, mypy)
#   runs on every PR and blocks merge.
# Per DEC-027: this framework config is DISTINCT from .git/hooks/pre-commit
#   (the Section 15 immutability bash hook installed in Phase 3 task 6 +
#   DEC-020). The bash hook enforces test-file immutability; this framework
#   config enforces code quality. Both co-exist and are both run on commit
#   because pre-commit-framework hooks and raw git hooks both execute on
#   `git commit`. Do NOT remove or alter .git/hooks/pre-commit.
#
# Installation (one-time, after `pip install pre-commit`):
#   pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files

# spec: 26.6 line 7752 — pre-commit hooks auto-run linting and formatting
default_language_version:
  python: python3

repos:
  # --------------------------------------------------------------------------
  # ruff — fast Python linter (replaces flake8 / isort / pyupgrade)
  # Per spec Section 26.6 lines 7747-7748: "ruff with rules from pyproject.toml"
  # Rule set configured in [tool.ruff.lint] in pyproject.toml (DEC-027).
  # --------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pin to a specific release for reproducibility; update via
    # `pre-commit autoupdate` + CI review.
    rev: v0.4.4
    hooks:
      - id: ruff
        # Apply auto-fixes (safe fixes only — unsafe fixes require --unsafe-fixes)
        args: [--fix, --exit-non-zero-on-fix]
        # Scope: only files under tomato_sandbox/ (not the legacy APIN code).
        # spec: 26.1 lines 7650 — "The practices apply to all code under
        # tomato_sandbox/. They do NOT apply to the legacy APIN code."
        files: ^tomato_sandbox/

  # --------------------------------------------------------------------------
  # black — code formatter
  # Per spec Section 26.6 lines 7748-7749:
  #   "black with line length 100. Auto-applied by pre-commit hook; CI verifies."
  # Line-length configured in [tool.black] in pyproject.toml (DEC-027).
  # --------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        # spec: 26.6 line 7749 — line length 100 (from pyproject.toml [tool.black])
        # Scope: only tomato_sandbox/
        files: ^tomato_sandbox/
        language_version: python3

  # --------------------------------------------------------------------------
  # mypy — static type checker
  # Per spec Section 26.6 lines 7746-7747:
  #   "mypy with strict mode on tomato_sandbox/."
  # mypy configuration in [tool.mypy] in pyproject.toml (DEC-027).
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        # Scope: only tomato_sandbox/
        files: ^tomato_sandbox/
        # Pass additional dependencies that mypy needs to resolve imports.
        # These are installed into mypy's isolated environment.
        additional_dependencies:
          - numpy
          - types-requests
        # Tell mypy to use the project-level pyproject.toml config
        args: [--config-file=pyproject.toml]

  # --------------------------------------------------------------------------
  # Standard pre-commit checks (trailing whitespace, YAML validity, etc.)
  # These are lightweight and catch common accidental mistakes.
  # Not explicitly required by spec Section 26 but consistent with the
  # "code quality gates" intent of Section 26.6.
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        files: ^tomato_sandbox/
      - id: end-of-file-fixer
        files: ^tomato_sandbox/
      - id: check-yaml
        # Validate this config file itself and any other YAML under the repo
      - id: check-toml
        # Validate pyproject.toml syntax
      - id: debug-statements
        # Catch accidental `breakpoint()` / `pdb.set_trace()` left in code
        files: ^tomato_sandbox/
      - id: check-added-large-files
        args: [--maxkb=1000]
