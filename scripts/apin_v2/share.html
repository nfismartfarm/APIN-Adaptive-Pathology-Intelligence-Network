<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shared Specimen · APIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..700,0..100,0..1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fbf9f3; --paper-soft:#fdfcf7; --paper-deep:#efe8d8;
  --paper-edge:#cabfa9; --rule:rgba(120,108,86,0.32);
  --ink:#1f1a14; --ink-soft:#5d5446; --ink-faint:#8a8068;
  --green:#2f6f3e; --green-deep:#1f5230;
  --ochre:#b07d1e; --crimson:#a8201f; --slate:#5b6b73;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#f1ebde;
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.62;
  min-height:100vh;padding:46px 20px;
  -webkit-font-smoothing:antialiased;
}
.sheet{
  background:var(--paper);
  border:1px solid var(--paper-edge);
  border-radius:14px;
  max-width:720px;margin:0 auto;
  padding:40px 44px 34px;
  position:relative;
  box-shadow:0 8px 34px rgba(31,26,20,0.13);
}
/* washi tape */
.sheet::before{
  content:'';position:absolute;top:-11px;left:50%;
  transform:translateX(-50%) rotate(-2deg);
  width:104px;height:20px;
  background:repeating-linear-gradient(46deg,#e7d7b3 0 7px,#ddc99c 7px 14px);
  opacity:0.9;border-radius:1px;
  box-shadow:0 1px 3px rgba(31,26,20,0.12);
}

/* ── Masthead ─────────────────────────────────────────────── */
.eyebrow{
  text-align:center;font-family:'Fraunces',serif;font-style:italic;
  font-size:12.5px;color:var(--ink-faint);letter-spacing:0.07em;
  margin-bottom:6px;
}
h1{
  font-family:'Fraunces',serif;font-weight:550;font-size:31px;
  line-height:1.18;letter-spacing:-0.012em;text-align:center;color:var(--ink);
  font-variation-settings:'SOFT' 28,'WONK' 0;
}
.sub{
  font-family:'Fraunces',serif;font-style:italic;font-size:13.5px;
  color:var(--ink-soft);text-align:center;margin-top:7px;
}
.rule{
  height:1px;background:var(--rule);margin:22px 0;
  border:none;
}
.rule.dotted{
  height:0;border-top:1px dashed var(--rule);background:none;
}

/* ── Specimen + heatmap tiles ─────────────────────────────── */
.tiles{
  display:grid;grid-template-columns:1fr 1fr;gap:18px;
}
.tile figure{margin:0}
.tile .frame{
  aspect-ratio:1/1;border-radius:9px;overflow:hidden;
  border:1px solid var(--paper-edge);
  background:var(--paper-deep);
  position:relative;
}
.tile .frame img{width:100%;height:100%;object-fit:cover;display:block}
.tile .fallback{
  position:absolute;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:8px;
  background:repeating-linear-gradient(45deg,#ece5d5 0 7px,#e2dac6 7px 14px);
  color:var(--ink-soft);text-align:center;padding:14px;
}
.tile.is-empty .frame img{display:none}
.tile.is-empty .fallback{display:flex}
.fallback .fb-icon{font-size:30px;opacity:0.5}
.fallback .fb-text{
  font-family:'Fraunces',serif;font-style:italic;font-size:12.5px;
}
.tile figcaption{
  margin-top:8px;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-faint);
}
.tile .cap-note{
  display:block;margin-top:3px;font-family:'Fraunces',serif;
  font-style:italic;font-size:11px;text-transform:none;letter-spacing:0;
  color:var(--ink-faint);
}

/* ── Reading panel + confidence gauge ─────────────────────── */
.reading{
  background:var(--paper-soft);
  border:1px solid var(--rule);border-radius:10px;
  padding:18px 20px;
}
.panel-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.13em;color:var(--green);
  margin-bottom:13px;
}
.gauge-top{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:7px;
}
.gauge-top .g-label{
  font-family:'Fraunces',serif;font-style:italic;font-size:14px;
  color:var(--ink-soft);
}
.gauge-top .g-value{
  font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:600;
  color:var(--ink);
}
.gauge-track{
  height:13px;border-radius:7px;
  background:var(--paper-deep);
  border:1px solid var(--paper-edge);
  overflow:hidden;position:relative;
}
.gauge-fill{
  height:100%;width:0;
  background:linear-gradient(90deg,#7aa05a,#2f6f3e);
  border-radius:6px 0 0 6px;
  transition:width 1.1s cubic-bezier(.2,.8,.2,1);
}
.gauge-scale{
  display:flex;justify-content:space-between;margin-top:4px;
  font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ink-faint);
}
.chips{
  display:flex;flex-wrap:wrap;gap:8px;margin-top:15px;
}
.chip{
  display:flex;align-items:baseline;gap:6px;
  background:var(--paper);border:1px solid var(--rule);
  border-radius:6px;padding:5px 11px;
}
.chip .c-key{
  font-family:'Fraunces',serif;font-style:italic;font-size:11.5px;
  color:var(--ink-faint);
}
.chip .c-val{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;
  color:var(--ink);
}

/* ── Content sections ─────────────────────────────────────── */
.section{margin-top:22px}
.section-head{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.13em;color:var(--green);
  margin-bottom:9px;
  display:flex;align-items:center;gap:9px;
}
.section-head::after{
  content:'';flex:1;height:1px;
  border-top:1px dashed var(--rule);
}
.section p{color:var(--ink);font-size:13.5px}
.section p + p{margin-top:7px}
.lead{
  font-family:'Fraunces',serif;font-style:italic;color:var(--ink-soft);
  font-size:12.5px;
}

/* treatment rows */
.tx-row{
  display:grid;grid-template-columns:84px 1fr;gap:12px;
  padding:9px 0;border-bottom:1px dashed var(--rule);
}
.tx-row:last-child{border-bottom:none}
.tx-sev{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;
  padding-top:2px;
}
.tx-sev.mild{color:var(--green)}
.tx-sev.moderate{color:var(--ochre)}
.tx-sev.severe{color:var(--crimson)}
.tx-row p{font-size:13px}

/* ── Footer ───────────────────────────────────────────────── */
.foot{
  margin-top:24px;text-align:center;
}
.foot .meta{
  font-family:'Fraunces',serif;font-style:italic;font-size:11.5px;
  color:var(--ink-faint);margin-bottom:12px;
}
.cta{
  display:inline-block;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  background:var(--green);color:#fff;
  padding:9px 22px;border-radius:7px;text-decoration:none;
  transition:background .15s;
}
.cta:hover{background:var(--green-deep)}

/* ── Error / loading ──────────────────────────────────────── */
.state{text-align:center;padding:46px 20px}
.state .s-emoji{font-size:34px;opacity:0.6;display:block;margin-bottom:10px}
.state p{
  font-family:'Fraunces',serif;font-style:italic;color:var(--ink-soft);
  margin:8px 0 18px;
}
.skeleton{
  text-align:center;padding:40px 20px;
  font-family:'Fraunces',serif;font-style:italic;color:var(--ink-faint);
}

@media(max-width:560px){
  .sheet{padding:30px 22px 26px}
  .tiles{grid-template-columns:1fr}
  h1{font-size:26px}
}
</style>
</head>
<body>
<div class="sheet">
  <div id="content">
    <div class="skeleton">loading shared specimen&hellip;</div>
  </div>
</div>

<script>
// Token is parsed client-side (never server-injected) to keep this page
// free of any reflected-XSS surface. Alphabet matches secrets.token_urlsafe.
const TOKEN = (() => {
  const m = window.location.pathname.match(/^\/share\/([A-Za-z0-9_-]{1,128})\/?$/);
  return m ? m[1] : "";
})();
const $ = s => document.querySelector(s);
const esc = s => String(s == null ? "" : s)
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;").replace(/'/g,"&#39;");

function prettyClass(s){
  return !s ? "Specimen"
    : s.replace(/_/g," ").replace(/\b\w/g, c => c.toUpperCase());
}
function fmtDate(iso){
  if (!iso) return "—";
  try{
    return new Date(iso).toLocaleDateString("en-IN",
      {day:"2-digit",month:"long",year:"numeric"});
  }catch(_){ return String(iso).slice(0,10); }
}
function cropIcon(crop){
  const c = (crop||"").toLowerCase();
  return c==="okra"?"\u{1F33F}":c==="brassica"?"\u{1F96C}"
       :c==="tomato"?"\u{1F345}":c==="chilli"?"\u{1F336}":"\u{1F4F7}";
}

// Build one image tile. `present` decides the initial state; a clean
// onerror handler (no innerHTML/outerHTML string surgery) flips the tile
// to its fallback if the binary route 404s.
function tile(kind, srcUrl, present, caption, note, fbIcon, fbText){
  const empty = present ? "" : " is-empty";
  const img = present
    ? `<img src="${esc(srcUrl)}" alt="${esc(caption)}"
            onerror="this.closest('.tile').classList.add('is-empty')">`
    : "";
  return `
    <div class="tile${empty}" data-kind="${esc(kind)}">
      <figure>
        <div class="frame">
          ${img}
          <div class="fallback">
            <span class="fb-icon">${fbIcon}</span>
            <span class="fb-text">${esc(fbText)}</span>
          </div>
        </div>
        <figcaption>${esc(caption)}
          ${note ? `<span class="cap-note">${esc(note)}</span>` : ""}
        </figcaption>
      </figure>
    </div>`;
}

function treatmentSection(tx){
  if (!tx) return "";
  if (typeof tx === "string"){
    return `<div class="section">
      <div class="section-head">Treatment</div>
      <p>${esc(tx)}</p></div>`;
  }
  const order = ["mild","moderate","severe"];
  const rows = order.filter(k => tx[k]).map(k => `
    <div class="tx-row">
      <span class="tx-sev ${k}">${k}</span>
      <p>${esc(tx[k])}</p>
    </div>`).join("");
  if (!rows) return "";
  return `<div class="section">
    <div class="section-head">Treatment by severity</div>
    ${rows}</div>`;
}

async function load(){
  const mount = $("#content");
  let r, p;
  try{
    r = await fetch(`/share/${encodeURIComponent(TOKEN)}/data`);
  }catch(_){
    mount.innerHTML = `<div class="state">
      <span class="s-emoji">\u{1F4E1}</span>
      <h1>Network error</h1>
      <p>Could not reach the server.</p>
      <a class="cta" href="/">Open the APIN diagnosis tool</a></div>`;
    return;
  }
  if (!r.ok){
    const j = await r.json().catch(()=>({}));
    mount.innerHTML = `<div class="state">
      <span class="s-emoji">\u{1F342}</span>
      <h1>Link not available</h1>
      <p>${esc(j.detail || "This share link is invalid, revoked, or expired.")}</p>
      <a class="cta" href="/">Open the APIN diagnosis tool</a></div>`;
    return;
  }
  p = await r.json();

  const info  = p.diagnosis_info || null;
  const cls   = prettyClass(p.predicted_class);
  const title = (info && info.full_name) ? info.full_name : cls;
  const crop  = (p.crop || "specimen");
  const date  = fmtDate(p.created_at);
  const confN = (p.confidence != null) ? Number(p.confidence) : null;
  const confPct = confN != null ? Math.round(confN*1000)/10 : null;
  const tier  = p.tier ? String(p.tier).replace(/_/g," ") : "—";
  const views = (p.share && p.share.view_count) || 0;
  const label = (p.share && p.share.label) ? p.share.label : "Shared specimen";

  const specimen = tile(
    "specimen", `/share/${encodeURIComponent(TOKEN)}/image`,
    p.has_image !== false,
    "Specimen photograph", "the leaf as submitted",
    cropIcon(p.crop), "image not captured");
  const heatmap = tile(
    "heatmap", `/share/${encodeURIComponent(TOKEN)}/heatmap`,
    p.has_heatmap !== false,
    "Model attention", "Grad-CAM++ · warmer = more influence",
    "▦", "heatmap not captured");

  // diagnosis sections (only when the lookup had an entry)
  let dx = "";
  if (info){
    if (info.cause || info.symptoms){
      dx += `<div class="section">
        <div class="section-head">What this is</div>
        ${info.cause ? `<p>${esc(info.cause)}</p>` : ""}
        ${info.symptoms ? `<p><span class="lead">Symptoms &mdash; </span>${esc(info.symptoms)}</p>` : ""}
      </div>`;
    }
    dx += treatmentSection(info.treatment);
    if (info.prevention){
      dx += `<div class="section">
        <div class="section-head">Prevention</div>
        <p>${esc(info.prevention)}</p></div>`;
    }
  }

  mount.innerHTML = `
    <div class="eyebrow">APIN · Public View</div>
    <h1>${esc(title)}</h1>
    <div class="sub">${esc(label)} · ${esc(crop.charAt(0).toUpperCase()+crop.slice(1))} · ${esc(date)}</div>

    <hr class="rule">

    <div class="tiles">${specimen}${heatmap}</div>

    <hr class="rule">

    <div class="reading">
      <div class="panel-label">Diagnosis reading</div>
      <div class="gauge-top">
        <span class="g-label">Calibrated confidence</span>
        <span class="g-value">${confPct != null ? confPct.toFixed(1)+"%" : "—"}</span>
      </div>
      <div class="gauge-track">
        <div class="gauge-fill" id="gauge-fill"></div>
      </div>
      <div class="gauge-scale"><span>0</span><span>50</span><span>100</span></div>
      <div class="chips">
        <span class="chip"><span class="c-key">crop</span><span class="c-val">${esc(crop.toUpperCase())}</span></span>
        <span class="chip"><span class="c-key">class</span><span class="c-val">${esc(cls)}</span></span>
        <span class="chip"><span class="c-key">tier</span><span class="c-val">${esc(tier)}</span></span>
        <span class="chip"><span class="c-key">recorded</span><span class="c-val">${esc(date)}</span></span>
      </div>
    </div>

    ${dx}

    <hr class="rule dotted">
    <div class="foot">
      <div class="meta">Public read-only diagnosis card · ${esc(views)} view${views===1?"":"s"}</div>
      <a class="cta" href="/">Open the APIN diagnosis tool &rarr;</a>
    </div>
  `;

  // Animate the confidence gauge after layout settles.
  if (confPct != null){
    requestAnimationFrame(()=>{
      const f = document.getElementById("gauge-fill");
      if (f) f.style.width = Math.max(2, Math.min(100, confPct)) + "%";
    });
  }
}
load();
</script>
</body>
</html>
