# PSV botanical weight matrix — [6 classes × 26 features]
# Human-readable for agronomist audit. Enumerated by feature name (not index)
# so that reordering features in the catalog does not silently corrupt the matrix.
#
# spec: 10.6.1 lines 2654-2700
# Loader validates that the feature names here exactly match the 26 names in
# features.FEATURE_NAMES (spec: 10.6.1 lines 2660-2664).
#
# Row order (6 classes in canonical order — spec: Section 3.7):
#   0: foliar
#   1: septoria
#   2: late_blight
#   3: ylcv
#   4: mosaic
#   5: healthy
#
# Placeholder values from spec Table 10.6.1. F.0 may tune within
# agronomist-approved plausibility ranges.
#
# Features at indices 19-21 (sharpness, aggregate_quality,
# psv_aggregate_reliability) have zero weights for ALL classes — they affect
# reliability (Section 10.7), not class identity.

# Each entry lists the 6 class weights in canonical order:
# [foliar, septoria, late_blight, ylcv, mosaic, healthy]

