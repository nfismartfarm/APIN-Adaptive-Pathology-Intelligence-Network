# tomato_sandbox/config/default.yaml
# Committed defaults — lowest precedence after env vars and local.yaml.
# spec: section 20.7 (configuration sources, lines 6591-6600)
#
# Hierarchy (highest precedence first):
#   1. Env vars with TOMATO_ prefix
#   2. tomato_sandbox/config/local.yaml  (gitignored; not present in this repo)
#   3. THIS FILE (default.yaml)
#   4. Hardcoded fallbacks in tomato_sandbox/config.py
#
# DO NOT put secrets here. Secrets (Slack webhooks, database URIs) are env-var only.
# spec: section 20.7 lines 6600-6603

server:
  host: "127.0.0.1"
  # Port 8767 is the sandbox port per Sandbox Directive / BLK-002 / DEC-012.
  # APIN runs on port 8766; unified server runs on 8005.
  # spec: section 20.3 "listen on configured port (default 8767)" line 6571
  port: 8767
  workers: 1
  # spec: section 20.2 "single uvicorn process with --workers 1 --loop asyncio" line 6441

gpu:
  # Timeout for GPU lock acquisition in seconds.
  # spec: section 20.6 "configurable timeout (TOMATO_GPU_LOCK_TIMEOUT_S, default 10)" line 6583
  lock_timeout_s: 10.0

pipeline:
  # Maximum number of images accepted by /predict_multi.
  # spec: section 20.3 info endpoint config.multi_image_max_n line 6487
  multi_image_max_n: 5
  # TTA trigger threshold — combined_max_prob below this value triggers TTA.
  # spec: section 20.3 info endpoint config.tta_trigger_threshold line 6488
  tta_trigger_threshold: 0.55
